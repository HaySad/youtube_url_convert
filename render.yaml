services:
  - type: web
    name: youtube-downloader-api
    runtime: node
    buildCommand: npm install && curl -fL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -o yt-dlp && chmod +x yt-dlp && echo "yt-dlp ready:" && ./yt-dlp --version
    startCommand: node server/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
